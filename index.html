// songs/{songId}                       : 曲データ本体
// songs/{songId}/reactions/{userId}    : ユーザーごとのリアクション { types: string[] }
// catalogs/{catalogId}                 : part-catalog / mark-catalog / reaction-catalog

async function getIndex() {
  try {
    const snap = await db.collection("songs").get();
    return snap.docs.map((doc) => {
      const d = doc.data();
      return {
        id: doc.id,
        title: d.title,
        artist: d.artist,
        tags: d.tags || [],
        authorId: d.authorId || null,
        authorName: d.authorName || null,
        updatedAt: d.updatedAt,
        createdAt: d.createdAt,
        reactionTotal: d.reactionTotal || 0,
        protected: !!d.passwordHash,
        shareMode: (d.share && d.share.mode === "locked") ? "locked" : "public", // ★Phase5
      };
    });
  } catch (e) { return []; }
}
async function getSong(id) {
  try {
    const doc = await db.collection("songs").doc(id).get();
    return doc.exists ? Object.assign({ id: doc.id }, doc.data()) : null;
  } catch (e) { return null; }
}
async function setSong(song) {
  const data = Object.assign({}, song);
  const id = data.id;
  delete data.id;
  await db.collection("songs").doc(id).set(data, { merge: true });
}
async function deleteSongKey(id) {
  try { await db.collection("songs").doc(id).delete(); } catch (e) {}
}
async function loadCatalog(key, defaults) {
  try {
    const doc = await db.collection("catalogs").doc(key).get();
    if (doc.exists && doc.data() && doc.data().items) return doc.data().items;
  } catch (e) {}
  try { await db.collection("catalogs").doc(key).set({ items: defaults }); } catch (e) {}
  return defaults;
}
async function saveCatalog(key, items) {
  try { await db.collection("catalogs").doc(key).set({ items }); } catch (e) {}
}
async function getReactions(songId) {
  try {
    const snap = await db.collection("songs").doc(songId).collection("reactions").get();
    const counts = {}, users = {};
    snap.docs.forEach((doc) => {
      const types = doc.data().types || [];
      users[doc.id] = types;
      types.forEach((t) => { counts[t] = (counts[t] || 0) + 1; });
    });
    return { counts, users };
  } catch (e) { return { counts: {}, users: {} }; }
}
async function setUserReaction(songId, userId, types) {
  await db.collection("songs").doc(songId).collection("reactions").doc(userId).set({ types });
}

// window.storage の中身を Firestore に一括コピーする（移行完了後は使わなくなる想定の一時的な機能）
async function migrateLegacyDataToFirestore(onProgress) {
  const legacyIndex = await getLegacyIndex();
  let done = 0;
  for (const entry of legacyIndex) {
    const song = await getLegacySong(entry.id);
    if (song) {
      await setSong(song);
      const reactions = await getLegacyReactions(song.id);
      const userIds = Object.keys(reactions.users || {});
      for (const uid of userIds) {
        await setUserReaction(song.id, uid, reactions.users[uid] || []);
      }
    }
    done += 1;
    if (onProgress) onProgress(done, legacyIndex.length);
  }
  for (const key of ["part-catalog", "mark-catalog", "point-catalog", "reaction-catalog"]) {
    const items = await getLegacyCatalog(key);
    if (items) await saveCatalog(key, items);
  }
  return legacyIndex.length;
}

function randomHex(len) {
  len = len || 16;
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map((b) => b.toString(16).padStart(2, "0")).join("");
}
async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
async function hashPin(pin, salt) { return sha256Hex(`${salt}:${pin}`); }
function isValidPin(pin) { return /^\d{4}$/.test(pin); }

// ---------- text-selection -> character offset helpers ----------
function textOffsetWalker(container) {
  return document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      let el = node.parentElement;
      while (el && el !== container) {
        if (el.dataset && el.dataset.annotSkip === "true") return NodeFilter.FILTER_REJECT;
        el = el.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    },
  });
}
function isInSkip(node, container) {
  let el = node.nodeType === 3 ? node.parentElement : node;
  while (el && el !== container) {
    if (el.dataset && el.dataset.annotSkip === "true") return true;
    el = el.parentElement;
  }
  return false;
}
function nodeOffsetToTextOffset(container, node, offset) {
  const walker = textOffsetWalker(container);
  let total = 0, current;
  while ((current = walker.nextNode())) {
    if (current === node) return total + offset;
    total += current.textContent.length;
  }
  return null;
}
function getSelectionOffsets(container) {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;
  const range = sel.getRangeAt(0);
  if (!container.contains(range.startContainer) || !container.contains(range.endContainer)) return null;
  if (isInSkip(range.startContainer, container) || isInSkip(range.endContainer, container)) return null;
  const start = nodeOffsetToTextOffset(container, range.startContainer, range.startOffset);
  const end = nodeOffsetToTextOffset(container, range.endContainer, range.endOffset);
  if (start == null || end == null || start === end) return null;
  return { start: Math.min(start, end), end: Math.max(start, end) };
}
// クリック/タップした画面座標から、文字と文字の間の位置(オフセット)を割り出す(記号スタンプモード用)
function getClickOffset(container, clientX, clientY) {
  let node, offset;
  if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(clientX, clientY);
    if (!pos) return null;
    node = pos.offsetNode; offset = pos.offset;
  } else if (document.caretRangeFromPoint) {
    const range = document.caretRangeFromPoint(clientX, clientY);
    if (!range) return null;
    node = range.startContainer; offset = range.startOffset;
  } else return null;
  if (!container.contains(node) || isInSkip(node, container)) return null;
  return nodeOffsetToTextOffset(container, node, offset);
}
// クリック/タップした画面座標が、ふりがな(ルビ)の文字の上だった場合に、そのルビ内の絶対オフセットを割り出す
// (「本」の読み「ほん」の「ほ」と「ん」の間、のようにルビ自体の文字間へ記号を置くためのスタンプモード用)。
// data-ruby-id / data-ruby-base-offset は LyricsRenderer 側でふりがな断片ごとに付与している。
function getRubyClickTarget(container, clientX, clientY) {
  let node, offset;
  if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(clientX, clientY);
    if (!pos) return null;
    node = pos.offsetNode; offset = pos.offset;
  } else if (document.caretRangeFromPoint) {
    const range = document.caretRangeFromPoint(clientX, clientY);
    if (!range) return null;
    node = range.startContainer; offset = range.startOffset;
  } else return null;
  if (!container.contains(node)) return null;
  let el = node.nodeType === 3 ? node.parentElement : node;
  while (el && el !== container) {
    if (el.dataset && el.dataset.rubyId != null) {
      const base = parseInt(el.dataset.rubyBaseOffset, 10) || 0;
      return { rubyId: el.dataset.rubyId, rubyOffset: base + offset };
    }
    el = el.parentElement;
  }
  return null;
}
function buildSegments(text, parts, marks, pointMarks, rubies) {
  const breakpoints = new Set([0, text.length]);
  (parts || []).forEach((p) => { breakpoints.add(p.start); breakpoints.add(p.end); });
  (marks || []).forEach((m) => { breakpoints.add(m.start); breakpoints.add(m.end); });
  (pointMarks || []).forEach((pt) => { breakpoints.add(pt.position); });
  (rubies || []).forEach((r) => { breakpoints.add(r.start); breakpoints.add(r.end); });
  const sorted = Array.from(breakpoints).filter((n) => n >= 0 && n <= text.length).sort((a, b) => a - b);
  const segments = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const s = sorted[i], e = sorted[i + 1];
    if (s === e) continue;
    const part = (parts || []).find((p) => p.start <= s && p.end >= e);
    const marksHere = (marks || []).filter((m) => m.start <= s && m.end >= e);
    const ruby = (rubies || []).find((r) => r.start <= s && r.end >= e);
    segments.push({ start: s, end: e, text: text.slice(s, e), part, marksHere, ruby });
  }
  if (segments.length === 0 && text.length > 0) segments.push({ start: 0, end: text.length, text, part: null, marksHere: [], ruby: null });
  return segments;
}

// ---------- automatic furigana (kuromoji.js をWeb Worker上で動かし、自動でルビ候補を生成する) ----------
// 辞書の構築・形態素解析はCPU負荷が高く、メインスレッド(画面描画)で行うとページが「応答なし」になることがあるため、
// 専用のWeb Workerを作ってバックグラウンドスレッドで実行する。
function withTimeout(promise, ms, message) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error(message || "タイムアウトしました")), ms);
    promise.then(
      (v) => { clearTimeout(timer); resolve(v); },
      (e) => { clearTimeout(timer); reject(e); }
    );
  });
}
const FURIGANA_WORKER_SRC = `
self.onmessage = function (e) {
  var msg = e.data || {};
  if (msg.type === "init") {
    try {
      importScripts("https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js");
      self.kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" }).build(function (err, tokenizer) {
        if (err) { self.postMessage({ type: "init-error", message: String((err && err.message) || err) }); return; }
        self._tokenizer = tokenizer;
        self.postMessage({ type: "ready" });
      });
    } catch (err) {
      self.postMessage({ type: "init-error", message: String((err && err.message) || err) });
    }
  } else if (msg.type === "tokenize") {
    try {
      if (!self._tokenizer) { self.postMessage({ type: "tokenize-error", message: "tokenizer not ready" }); return; }
      var tokens = self._tokenizer.tokenize(msg.text);
      self.postMessage({ type: "tokenize-result", tokens: tokens });
    } catch (err) {
      self.postMessage({ type: "tokenize-error", message: String((err && err.message) || err) });
    }
  }
};
`;
let furiganaWorker = null;
let furiganaWorkerReadyPromise = null;
// 初回呼び出し時だけWorkerを立ち上げ、CDNからkuromoji本体+辞書(数MB)をWorker内で取得・構築する。以後はページ内で使い回す。
function getFuriganaWorker() {
  if (furiganaWorkerReadyPromise) return furiganaWorkerReadyPromise;
  if (typeof Worker === "undefined") return Promise.reject(new Error("このブラウザはWeb Workerに対応していません"));
  const blobUrl = URL.createObjectURL(new Blob([FURIGANA_WORKER_SRC], { type: "application/javascript" }));
  const worker = new Worker(blobUrl);
  furiganaWorker = worker;
  furiganaWorkerReadyPromise = new Promise((resolve, reject) => {
    function onMessage(e) {
      const data = e.data || {};
      if (data.type === "ready") { worker.removeEventListener("message", onMessage); resolve(worker); }
      else if (data.type === "init-error") { worker.removeEventListener("message", onMessage); reject(new Error(data.message)); }
    }
    worker.addEventListener("message", onMessage);
    worker.addEventListener("error", (e) => reject(new Error(e.message || "Workerでエラーが発生しました")));
    worker.postMessage({ type: "init" });
  });
  return furiganaWorkerReadyPromise;
}
// 失敗時に呼び、次回また最初からWorkerを立ち上げ直せるようにする。
function resetFuriganaWorker() {
  if (furiganaWorker) { try { furiganaWorker.terminate(); } catch (e) {} }
  furiganaWorker = null;
  furiganaWorkerReadyPromise = null;
}
function tokenizeWithWorker(worker, text) {
  return new Promise((resolve, reject) => {
    function onMessage(e) {
      const data = e.data || {};
      if (data.type === "tokenize-result") { worker.removeEventListener("message", onMessage); resolve(data.tokens); }
      else if (data.type === "tokenize-error") { worker.removeEventListener("message", onMessage); reject(new Error(data.message)); }
    }
    worker.addEventListener("message", onMessage);
    worker.postMessage({ type: "tokenize", text });
  });
}
function kataToHira(str) { return str.replace(/[\u30A1-\u30F6]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60)); }
function hasKanji(str) { return /[\u4E00-\u9FFF々〆〤]/.test(str); }
function isHiraganaChar(ch) { return ch >= "\u3040" && ch <= "\u309F"; }
// 単語の表記(surface)と読み(reading, ひらがな)から、送り仮名を除いた「漢字コア」部分だけを取り出す。
// 例: surface="食べる", reading="たべる" -> { 表記中の位置=[0,1)("食"), reading="た" }
function kanjiCoreOfToken(surface, readingHiragana) {
  if (!readingHiragana || readingHiragana === "*") return null;
  let startTrim = 0;
  while (startTrim < surface.length && startTrim < readingHiragana.length &&
    isHiraganaChar(surface[startTrim]) && surface[startTrim] === readingHiragana[startTrim]) startTrim++;
  let endTrim = 0;
  while (endTrim < surface.length - startTrim && endTrim < readingHiragana.length - startTrim &&
    isHiraganaChar(surface[surface.length - 1 - endTrim]) && surface[surface.length - 1 - endTrim] === readingHiragana[readingHiragana.length - 1 - endTrim]) endTrim++;
  const coreStart = startTrim, coreEnd = surface.length - endTrim;
  if (coreStart >= coreEnd) return null;
  const coreSurface = surface.slice(coreStart, coreEnd);
  if (!hasKanji(coreSurface)) return null;
  return { offsetStart: coreStart, offsetEnd: coreEnd, reading: readingHiragana.slice(startTrim, readingHiragana.length - endTrim) };
}
function overlapsAnyRange(start, end, ranges) { return (ranges || []).some((r) => start < r.end && end > r.start); }
// Worker側で得たtokens配列から、漢字を含む単語ごとにルビ候補を作る。existingRubiesと範囲が重なる候補は除外する(既存の手動ルビを上書きしない)。
function buildAutoRubies(text, tokens, existingRubies) {
  const occupied = (existingRubies || []).slice();
  const results = [];
  let cursor = 0;
  (tokens || []).forEach((tok) => {
    const surface = tok.surface_form;
    if (!surface) return;
    const start = text.indexOf(surface, cursor);
    if (start === -1) return; // 位置がズレた場合は安全のためスキップ(自動生成なので取りこぼしても手動で追加可能)
    cursor = start + surface.length;
    if (!hasKanji(surface)) return;
    const reading = tok.reading ? kataToHira(tok.reading) : null;
    const core = kanjiCoreOfToken(surface, reading);
    if (!core) return;
    const absStart = start + core.offsetStart, absEnd = start + core.offsetEnd;
    if (overlapsAnyRange(absStart, absEnd, occupied)) return;
    const entry = { id: newId(), start: absStart, end: absEnd, text: core.reading };
    results.push(entry);
    occupied.push(entry);
  });
  return results;
}

// ---------- youtube reference videos (oEmbed, no API key required) ----------
function extractYoutubeId(url) {
  try {
    const u = new URL(url.trim());
    const host = u.hostname.replace("www.", "");
    if (host === "youtu.be") return u.pathname.slice(1).split("/")[0] || null;
    if (host === "youtube.com" || host === "m.youtube.com") {

async function fetchYoutubeMeta(url) {
  const videoId = extractYoutubeId(url);
  if (!videoId) return null;
  let title = null, channel = null;
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if (res.ok) { const data = await res.json(); title = data.title || null; channel = data.author_name || null; }
  } catch (e) {}
  return { videoId, title, channel, thumbnail: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` };
}

function LyricsRenderer({ text, parts, marks, points, rubies, partCatalog, markCatalog, pointCatalog, interactive, containerRef, onMouseUp, onTouchEnd }) {
  const segments = useMemo(() => buildSegments(text || "", parts, marks, points, rubies), [text, parts, marks, points, rubies]);
  // ★ルビの外(通常の文字間)に置かれた記号のうち、配置が「文字と文字の間」のものだけを対象。
  // 「文字の真上」の記号はabovePointsByPosで別枠管理し、ルビ内部(rubyIdあり)の記号はpointsByRubyOffsetで扱う。
  const pointsByPos = useMemo(() => {
    const map = {};
    (points || []).forEach((pt) => {
      if (pt.rubyId) return;
      const def = (pointCatalog || []).find((pc) => pc.id === pt.typeId);
      if (def && def.placement === "above") return;
      (map[pt.position] = map[pt.position] || []).push(pt);
    });
    return map;
  }, [points, pointCatalog]);
  // ★Phase6: 文字の真上に配置する記号(記号カタログでplacement:"above"を指定したもの)。
  // positionはその文字自身の開始オフセット(=text[position]の文字の真上に出す)。
  const abovePointsByPos = useMemo(() => {
    const map = {};
    (points || []).forEach((pt) => {
      if (pt.rubyId) return;
      const def = (pointCatalog || []).find((pc) => pc.id === pt.typeId);
      if (!def || def.placement !== "above") return;
      (map[pt.position] = map[pt.position] || []).push(pt);
    });
    return map;
  }, [points, pointCatalog]);
  // ★ふりがな(ルビ)自体の文字と文字の間に置かれた記号。key = "rubyId:そのルビ文字列内の絶対オフセット"
  const pointsByRubyOffset = useMemo(() => {
    const map = {};
    (points || []).forEach((pt) => { if (!pt.rubyId) return; const k = pt.rubyId + ":" + pt.rubyOffset; (map[k] = map[k] || []).push(pt); });
    return map;
  }, [points]);
  function renderPointsAt(pos) {
    const list = pointsByPos[pos];
    if (!list || list.length === 0) return null;
    return list.map((pt) => {
      const def = (pointCatalog || []).find((pc) => pc.id === pt.typeId);
      if (!def) return null;
      return E("span", {
        key: pt.id, "data-annot-skip": "true", title: def.label,
        style: { display: "inline-block", color: def.color, fontWeight: 700, fontSize: 12, margin: "0 2px", verticalAlign: "middle" },
      }, def.symbol);
    });
  }
  function renderRubyPointsAt(rubyId, offset) {
    const list = pointsByRubyOffset[rubyId + ":" + offset];
    if (!list || list.length === 0) return null;
    return list.map((pt) => {
      const def = (pointCatalog || []).find((pc) => pc.id === pt.typeId);
      if (!def) return null;
      return E("span", {
        key: pt.id, "data-annot-skip": "true", title: def.label,
        style: { display: "inline-block", color: def.color, fontWeight: 700, fontSize: 9, margin: "0 1px", verticalAlign: "middle" },
      }, def.symbol);
    });
  }
  // ★Phase6: 指定した1文字(pos = text[pos])の真上に出す記号ノード(rtの中身)を作る
  function renderAboveSymbolsAt(pos) {
    const list = abovePointsByPos[pos];
    if (!list || list.length === 0) return null;
    return list.map((pt) => {
      const def = (pointCatalog || []).find((pc) => pc.id === pt.typeId);
      if (!def) return null;
      return E("span", {
        key: pt.id, "data-annot-skip": "true", title: def.label,
        style: { display: "inline-block", color: def.color, fontWeight: 700, margin: "0 1px" },
      }, def.symbol);
    });
  }
  function hasAboveIn(s, e) {
    for (let p = s; p < e; p++) if (abovePointsByPos[p]) return true;
    return false;
  }
  // ★Phase6(修正): 文字の真上の記号は、入れ子のrubyだとブラウザによって再描画のタイミングでレイアウトが更新されず
  // 「データは登録されているのに表示上だけ現れない」ことがあったため、position:absoluteで確実に重ねる方式に変更。
  // baseNode(通常の文字、またはふりがな付きのruby)の上端よりさらに上に、記号を絶対配置で乗せる。
  function withAboveSymbols(key, baseNode, syms) {
    if (!syms || syms.length === 0) return baseNode;
    return E("span", { key, style: { position: "relative", display: "inline-block" } }, [
      E("span", {
        key: "abv", "data-annot-skip": "true",
        style: {
          position: "absolute", left: "50%", bottom: "100%", transform: "translateX(-50%)",
          marginBottom: 2, whiteSpace: "nowrap", fontFamily: FONT_M, fontSize: 10, lineHeight: 1,
          pointerEvents: "none",
        },
      }, syms),
      baseNode,
    ]);
  }
  const nodes = [E(React.Fragment, { key: "pt-0" }, renderPointsAt(0))];
  function segStyleAndTitleOf(seg) {
    const partDef = seg.part ? (partCatalog || []).find((p) => p.id === seg.part.colorId) : null;
    const markDefs = (seg.marksHere || []).map((m) => (markCatalog || []).find((mc) => mc.id === m.typeId)).filter(Boolean);
    const segStyle = {
      borderBottom: partDef ? `3px solid ${partDef.color}` : "none",
      paddingBottom: partDef ? 1 : 0,
      backgroundColor: markDefs.length ? `${markDefs[0].color}4D` : "transparent",
      borderRadius: 2,
    };
    const title = markDefs.length ? markDefs.map((m) => m.label).join(" / ") : undefined;
    return { segStyle, title };
  }
  // ★ルビの範囲内(文字と文字の間)に記号(スタンプ)を挿入した場合、その記号を「本文の行」ではなく
  // 「ふりがなの行」の方に差し込んで表示する(例: 本[記号]棚 ではなく ほん[記号]だな のように上段に出す)。
  // ルビの文字列には1文字ごとの対応が保存されていないため、各セグメントの本文の文字数比率で
  // ふりがな文字列を按分して振り分ける(複合語の読みが不均等な場合は多少の誤差が出ることがある)。
  // ★さらに、ふりがな自体の文字の間(例:「ほん」の「ほ」と「ん」の間)にも記号を置けるようにしている。
  // その場合は本文側は分割せず(1文字のまま)、ふりがな側だけを内部で区切って記号を挟み込む。
  // 各ふりがな断片には data-ruby-id / data-ruby-base-offset を付与し、クリック位置→ルビ内オフセットの
  // 逆算(getRubyClickTarget)に使えるようにしている。
  // ★文字の真上の記号は、position:absoluteで文字(またはふりがな付きruby)の真上に重ねて表示する(withAboveSymbols)。
  // ふりがなが付いている文字の場合は、ふりがなを含むruby全体の上端よりさらに上に乗るので「ふりがなの上に記号」になる。

      let runningBase = 0;
      const boundaries = [0];

      group.forEach((gseg, gi) => {

        )).sort((a, b) => a - b);
        const rtChildren = [];
        let cursor = segStart;

          rtChildren.push(E("span", { key: "t" + oi, "data-ruby-id": seg.ruby.id, "data-ruby-base-offset": String(cursor) }, rubyStr.slice(cursor, o)));
          const syms = renderRubyPointsAt(seg.ruby.id, o);
          if (syms) rtChildren.push(E(React.Fragment, { key: "s" + oi }, syms));
          cursor = o;
        });
        rtChildren.push(E("span", { key: "tlast", "data-ruby-id": seg.ruby.id, "data-ruby-base-offset": String(cursor) }, rubyStr.slice(cursor, segEnd)));
        const isLastInGroup = gi === group.length - 1;
        const midSymbols = !isLastInGroup ? renderPointsAt(gseg.end) : null; // ルビの内側(文字と文字の区切り)にある記号→ふりがな行へ
        rtChildren.push(midSymbols ? E("span", { key: "sym", "data-annot-skip": "true", style: { margin: "0 1px" } }, midSymbols) : null);
        const rubyChildren = [
          E("span", { key: "base", style: segStyle, title }, gseg.text),
          E("rt", { key: "rt", "data-annot-skip": "true", style: { fontFamily: FONT_M, fontSize: 10, fontWeight: 500, color: "#8A6D3C", userSelect: "none" } }, rtChildren),
        ];
        const rubyNode = E("ruby", { key: "ruby" }, rubyChildren);
        // ★このgsegの範囲内に「文字の真上」記号があれば、ふりがなのさらに上に重ねて表示する
        if (hasAboveIn(gseg.start, gseg.end)) {
          const aboveSyms = [];
          for (let p = gseg.start; p < gseg.end; p++) { const s = renderAboveSymbolsAt(p); if (s) aboveSyms.push.apply(aboveSyms, s); }
          nodes.push(withAboveSymbols(`seg-${i}-${gi}`, rubyNode, aboveSyms));
        } else {
          nodes.push(E("ruby", { key: `seg-${i}-${gi}` }, rubyChildren));
        }
      });
      const lastEnd = group[group.length - 1].end;
      nodes.push(E(React.Fragment, { key: "pt-" + lastEnd }, renderPointsAt(lastEnd))); // ルビ全体の外側との境目の記号は従来通り本文行
      i = j;
    } else {
      const { segStyle, title } = segStyleAndTitleOf(seg);
      if (!hasAboveIn(seg.start, seg.end)) {
        nodes.push(E("span", { key: "seg-" + i, title, style: segStyle }, seg.text));
      } else {
        // ★区間内に「文字の真上」記号があるので、対象の文字だけ真上に記号を重ねて出す(ふりがなが無い文字の場合)
        const runs = [];
        let cursor = seg.start;
        for (let p = seg.start; p < seg.end; p++) {
          if (!abovePointsByPos[p]) continue;
          if (p > cursor) runs.push(E("span", { key: "pre" + p, title, style: segStyle }, text.slice(cursor, p)));
          const syms = renderAboveSymbolsAt(p);
          const charNode = E("span", { key: "b", title, style: segStyle }, text.slice(p, p + 1));

        if (cursor < seg.end) runs.push(E("span", { key: "post", title, style: segStyle }, text.slice(cursor, seg.end)));
        nodes.push(E(React.Fragment, { key: "seg-" + i }, runs));
      }
      nodes.push(E(React.Fragment, { key: "pt-" + seg.end }, renderPointsAt(seg.end)));

      fontFamily: FONT_M, color: C.inkText, fontSize: 14, lineHeight: 3.6, whiteSpace: "pre-wrap",

      E("div", { key: "l", style: { fontSize: 10, color: "#8A8060", marginBottom: 6, fontFamily: FONT_M } }, "② 記号を選んでから歌詞をポンポンとクリック/タップすると配置(スタンプモード)。ふりがなの文字と文字の間をタップすると、ふりがな側に記号を挟めます"),

    const rightColumn = isWideScreen && E("div", { key: "right", style: { width: 250, flexShrink: 0, position: "sticky", top: 16, alignSelf: "flex-start" } }, [paintPanel, stampPanel]);
    mainContent = E("div", { style: { maxWidth: isWideScreen ? 1080 : 768, margin: "0 auto", padding: "32px 24px" } },
      E("div", { style: { display: "flex", gap: 24, alignItems: "flex-start" } }, [leftColumn, rightColumn])
    );
    mainContent = E("div", { style: { position: "relative" } }, [
      mainContent,
      selRange && selRect && !paintPart && !stampType && E("div", {
        key: "floatbar",
        ref: toolbarRef,
        onMouseDown: (ev) => { if (ev.target.tagName !== "INPUT" && ev.target.tagName !== "TEXTAREA") ev.preventDefault(); },
        style: {
          position: "fixed", zIndex: 60, width: "min(300px, 92vw)",
          left: toolbarLeft, top: showAbove ? Math.max(8, selRect.top - 8) : Math.min(window.innerHeight - 8, selRect.bottom + 8),

          background: C.inkPanel, border: `1px solid ${C.brassDim}`, borderRadius: 8, padding: "10px 12px",

      }, [
        E("div", { key: "sel", style: { fontFamily: FONT_M, fontSize: 10, color: C.paperTextDim, marginBottom: 6 } }, `選択中: 「${selectedSong.lyrics.slice(selRange.start, selRange.end).slice(0, 16)}${selRange.end - selRange.start > 16 ? "…" : ""}」`),
        E("div", { key: "marks", style: { marginBottom: 8 } }, [

            E("span", { key: "t", style: { fontSize: 9, color: "#8A8060", fontFamily: FONT_M } }, "マーカー(選択範囲をハイライト)"),
            draftMarks.some((m) => !(m.end <= selRange.start || m.start >= selRange.end)) && E("button", { key: "clr", onClick: clearMarksInSelection, style: { fontSize: 9, color: C.wax, background: "none", border: `1px solid ${C.wax}`, borderRadius: 3, padding: "1px 6px", cursor: "pointer" } }, "マーカーのみ解除"),
          ]),

    E("div", { key: "content", style: { flex: 1, overflowY: "auto" } }, mainContent),

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(E(LyricsArchive));
